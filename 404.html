<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gen Player - Page Not Found</title>
    <meta name="description" content="Gen Player 页面不存在时的兜底页面，帮助用户返回首页、隐私政策或支持页面。" />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var theme = (params.get('theme') || localStorage.getItem('genplayer-theme') || '').toLowerCase();
        var lang = (params.get('lang') || localStorage.getItem('genplayer-language') || '').toLowerCase();
        if (theme !== 'dark' && theme !== 'light') {
          theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (lang.indexOf('zh') === 0) {
          document.documentElement.lang = 'zh-CN';
        } else if (lang.indexOf('en') === 0) {
          document.documentElement.lang = 'en';
        }
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
        document.documentElement.style.backgroundColor = theme === 'dark' ? '#070812' : '#f4efe8';
      })();
    </script>
    <link rel="stylesheet" href="./assets/styles.css?v=20260321j" />
  </head>
  <body data-page="not-found">
    <div class="site-backdrop" aria-hidden="true">
      <span class="backdrop-orb orb-a"></span>
      <span class="backdrop-orb orb-b"></span>
      <span class="backdrop-grid"></span>
    </div>

    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html">
          <img class="brand-mark" src="./assets/app-icon.png" alt="Gen Player app icon" />
          <span>Gen Player</span>
        </a>
        <nav class="nav-links">
          <a href="./index.html" data-i18n="nav.home">首页</a>
          <a href="./changelog.html" data-i18n="nav.changelog">版本记录</a>
          <a href="./privacy.html" data-i18n="nav.privacy">隐私政策</a>
          <a href="./feedback.html" data-i18n="nav.feedback">问题反馈</a>
        </nav>
        <div class="toolbar">
          <button type="button" class="toggle" id="themeToggle" aria-label="Theme toggle">◐</button>
          <button type="button" class="toggle" id="langToggle" aria-label="Language toggle">EN</button>
        </div>
      </div>
    </header>

    <main class="page-main page-shell not-found-page">
      <section class="container">
        <div class="card status-card modern-status-card reveal-on-scroll">
          <span class="eyebrow" data-i18n="notFoundPage.eyebrow">页面不存在</span>
          <h1 data-i18n="notFoundPage.title">这个页面不存在，或者已经移动。</h1>
          <p class="lead" data-i18n="notFoundPage.body">你可以返回首页继续浏览，或前往隐私政策和问题反馈页面。</p>
          <div class="hero-actions centered">
            <a class="button primary" href="./index.html" data-i18n="notFoundPage.primaryCta">返回首页</a>
            <a class="button secondary" href="./feedback.html" data-i18n="notFoundPage.secondaryCta">问题反馈</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-shell">
        <p>© <span id="year"></span> Gen Player</p>
        <div class="footer-links">
          <a href="./changelog.html" data-i18n="footer.changelog">版本记录</a>
          <a href="./privacy.html" data-i18n="footer.privacy">隐私政策</a>
          <a href="./feedback.html" data-i18n="footer.feedback">问题反馈</a>
        </div>
      </div>
    </footer>

    <script src="./assets/site.js?v=20260402b"></script>
  </body>
</html>
