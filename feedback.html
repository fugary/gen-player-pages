<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenPlayer — Support & Feedback</title>
    <meta name="description" content="GenPlayer 问题反馈与支持页面，提供联系邮箱、反馈建议与常见问题说明。" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="feedback">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html">GenPlayer</a>
        <nav class="nav-links">
          <a href="./index.html" data-i18n="nav.home">首页</a>
          <a href="./privacy.html" data-i18n="nav.privacy">隐私政策</a>
          <a href="./feedback.html" data-i18n="nav.feedback">问题反馈</a>
        </nav>
        <div class="toolbar">
          <button type="button" class="toggle" id="themeToggle" aria-label="Theme toggle">◐</button>
          <button type="button" class="toggle" id="langToggle" aria-label="Language toggle">EN</button>
        </div>
      </div>
    </header>

    <main class="container page-main feedback-page">
      <div class="page-header">
        <span class="eyebrow" data-i18n="feedbackPage.eyebrow">Support & Feedback</span>
        <h1 data-i18n="feedbackPage.title">问题反馈与支持</h1>
        <p data-i18n="feedbackPage.description">如果你在使用 GenPlayer 时遇到问题，欢迎通过下方方式联系。</p>
      </div>

      <div class="grid two-columns feedback-grid">
        <section class="card prose-block">
          <h2 data-i18n="feedbackPage.contactTitle">联系渠道</h2>
          <p data-i18n="feedbackPage.contactBody"></p>
          <a class="button primary" id="emailLink" href="mailto:support@genplayer.app">support@genplayer.app</a>
        </section>

        <section class="card prose-block">
          <h2 data-i18n="feedbackPage.reviewTitle">iOS 审核与支持建议</h2>
          <p data-i18n="feedbackPage.reviewBody"></p>
        </section>
      </div>

      <section class="card feedback-form-card">
        <div class="section-heading left">
          <span class="eyebrow" data-i18n="feedbackPage.formEyebrow">Static Mail Form</span>
          <h2 data-i18n="feedbackPage.formTitle">使用静态表单生成反馈邮件</h2>
          <p data-i18n="feedbackPage.formBody">此表单不会将数据发送到服务器，而是为你自动生成一封邮件内容。</p>
        </div>
        <form id="feedbackForm" class="feedback-form">
          <label>
            <span data-i18n="feedbackPage.formEmail">你的邮箱</span>
            <input type="email" name="email" placeholder="name@example.com" />
          </label>
          <label>
            <span data-i18n="feedbackPage.formTopic">问题类型</span>
            <select name="topic">
              <option value="bug" data-i18n="feedbackPage.topicBug">Bug 反馈</option>
              <option value="feature" data-i18n="feedbackPage.topicFeature">功能建议</option>
              <option value="review" data-i18n="feedbackPage.topicReview">审核沟通</option>
            </select>
          </label>
          <label>
            <span data-i18n="feedbackPage.formDevice">设备/系统信息</span>
            <input type="text" name="device" placeholder="iPhone / iOS version" />
          </label>
          <label>
            <span data-i18n="feedbackPage.formMessage">详细说明</span>
            <textarea name="message" rows="7" placeholder="Describe your issue..."></textarea>
          </label>
          <button class="button primary" type="submit" data-i18n="feedbackPage.formSubmit">生成反馈邮件</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-shell">
        <p>© <span id="year"></span> GenPlayer</p>
        <div class="footer-links">
          <a href="./index.html" data-i18n="footer.home">首页</a>
          <a href="./privacy.html" data-i18n="footer.privacy">隐私政策</a>
        </div>
      </div>
    </footer>

    <script src="./assets/site.js"></script>
  </body>
</html>
